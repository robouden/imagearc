<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FotoArch</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="topbar">
  <h1>Foto<span>Arch</span></h1>
  <p class="tagline">AI captioning &amp; IPTC/XMP metadata for photographers</p>
</header>

<main class="layout">
  <section class="card">
    <h2>Batch caption</h2>
    <label>Folder path
      <input id="folder" type="text" placeholder="/path/to/photos">
    </label>
    <div class="row">
      <label>Provider
        <select id="provider">
          <option value="ollama">ollama</option>
          <option value="anthropic">anthropic</option>
          <option value="openai">openai</option>
          <option value="gemini">gemini</option>
          <option value="openai-compatible">openai-compatible</option>
        </select>
      </label>
      <label>Model
        <input id="model" type="text" value="llava">
      </label>
    </div>
    <div class="row">
      <label class="checkbox"><input id="recurse" type="checkbox" checked> Recurse subfolders</label>
      <label class="checkbox"><input id="dryrun" type="checkbox"> Dry run</label>
    </div>
    <button id="start" class="btn-primary">Start batch</button>

    <h3>Activity</h3>
    <div id="log" class="log"></div>
  </section>

  <section class="card">
    <h2>Metadata editor</h2>
    <label>File path
      <input id="meta-path" type="text" placeholder="/path/to/photo.jpg">
      <button id="meta-load" class="btn-secondary">Load</button>
    </label>
    <label>Caption
      <textarea id="meta-caption" rows="3"></textarea>
    </label>
    <label>Keywords (comma-separated)
      <input id="meta-keywords" type="text">
    </label>
    <div class="row">
      <label>Byline
        <input id="meta-byline" type="text">
      </label>
      <label>Location
        <input id="meta-location" type="text">
      </label>
    </div>
    <button id="meta-save" class="btn-primary">Save metadata</button>
    <p id="meta-status" class="status"></p>
  </section>

  <section class="card">
    <h2>Catalog</h2>
    <label>Folder path
      <input id="cat-folder" type="text" placeholder="/path/to/photos">
    </label>
    <label>Output CSV
      <input id="cat-output" type="text" value="catalog.csv">
    </label>
    <button id="cat-build" class="btn-primary">Build catalog</button>
    <p id="cat-status" class="status"></p>
  </section>
</main>

<footer>
  <p>FotoArch &mdash; non-destructive, no lock-in. MIT licensed.</p>
</footer>

<script src="/app.js"></script>
</body>
</html>
