<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ImageArc</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="mark">◈</span>
    <span class="name">Image<b>Arc</b></span>
  </div>
  <nav class="tabs" role="tablist">
    <button class="tab is-active" data-tab="caption" role="tab">Caption</button>
    <button class="tab" data-tab="library" role="tab">Library</button>
    <button class="tab" data-tab="dashboard" role="tab">Dashboard</button>
    <button class="tab" data-tab="metadata" role="tab">Metadata</button>
    <button class="tab" data-tab="catalog" role="tab">Catalog</button>
  </nav>
</header>

<main class="stage">
  <!-- Caption -->
  <section class="panel is-active" data-panel="caption">
    <div class="field">
      <label for="folder">Folder</label>
      <div class="inline">
        <input id="folder" type="text" placeholder="/path/to/photos">
        <button class="btn ghost" data-browse="folder">Browse…</button>
      </div>
    </div>
    <div class="grid-2">
      <div class="field">
        <label for="provider">Provider</label>
        <select id="provider">
          <option value="ollama">ollama</option>
          <option value="anthropic">anthropic</option>
          <option value="openai">openai</option>
          <option value="gemini">gemini</option>
          <option value="openai-compatible">openai-compatible</option>
        </select>
      </div>
      <div class="field">
        <label for="model">Model</label>
        <select id="model"></select>
      </div>
    </div>
    <div class="toggles">
      <label class="check"><input id="recurse" type="checkbox" checked><span>Recurse subfolders</span></label>
      <label class="check"><input id="dryrun" type="checkbox"><span>Dry run</span></label>
    </div>
    <button id="start" class="btn">Start batch</button>
    <div id="progress" class="progress" hidden>
      <div class="progress-head">
        <span id="progress-label">0 / 0</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
    </div>
    <div id="log" class="log" aria-live="polite"></div>
  </section>

  <!-- Library -->
  <section class="panel wide" data-panel="library">
    <div class="lib-bar">
      <input id="lib-q" type="text" placeholder="Search captions &amp; keywords…">
      <input id="lib-keyword" type="text" placeholder="keyword filter">
      <button id="lib-search" class="btn">Search</button>
    </div>
    <details class="lib-index">
      <summary>Index a folder into the library</summary>
      <div class="inline">
        <input id="lib-folder" type="text" placeholder="/path/to/photos">
        <button class="btn ghost" data-browse="lib-folder">Browse…</button>
        <label class="check"><input id="lib-recurse" type="checkbox" checked><span>Recurse</span></label>
        <button id="lib-index-btn" class="btn">Index</button>
      </div>
      <div id="lib-progress" class="progress" hidden>
        <div class="progress-head"><span id="lib-progress-label">0 / 0</span><span id="lib-progress-pct">0%</span></div>
        <div class="progress-track"><div id="lib-progress-bar" class="progress-bar"></div></div>
      </div>
    </details>
    <p id="lib-count" class="status"></p>
    <div id="lib-grid" class="gallery"></div>
  </section>

  <!-- Dashboard -->
  <section class="panel wide" data-panel="dashboard">
    <div class="dash-head">
      <div class="stat-tiles">
        <div class="tile"><span id="dash-total" class="tile-num">0</span><span class="tile-lbl">Photos indexed</span></div>
        <div class="tile"><span id="dash-captioned" class="tile-num">0</span><span class="tile-lbl">Captioned</span></div>
      </div>
      <button id="dash-refresh" class="btn ghost">Refresh</button>
    </div>
    <div class="dash-cols">
      <div class="dash-card"><h3>Top keywords</h3><ul id="dash-keywords" class="bars"></ul></div>
      <div class="dash-card"><h3>Locations</h3><ul id="dash-locations" class="bars"></ul></div>
      <div class="dash-card"><h3>Bylines</h3><ul id="dash-bylines" class="bars"></ul></div>
    </div>
  </section>

  <!-- Metadata -->
  <section class="panel" data-panel="metadata">
    <div class="field with-action">
      <label for="meta-path">File</label>
      <div class="inline">
        <input id="meta-path" type="text" placeholder="/path/to/photo.jpg">
        <button id="meta-load" class="btn ghost">Load</button>
      </div>
    </div>
    <div class="field">
      <label for="meta-caption">Caption</label>
      <textarea id="meta-caption" rows="3"></textarea>
    </div>
    <div class="field">
      <label for="meta-keywords">Keywords <em>comma-separated</em></label>
      <input id="meta-keywords" type="text">
    </div>
    <div class="grid-2">
      <div class="field">
        <label for="meta-byline">Byline</label>
        <input id="meta-byline" type="text">
      </div>
      <div class="field">
        <label for="meta-location">Location</label>
        <input id="meta-location" type="text">
      </div>
    </div>
    <button id="meta-save" class="btn">Save metadata</button>
    <p id="meta-status" class="status"></p>
  </section>

  <!-- Catalog -->
  <section class="panel" data-panel="catalog">
    <div class="field">
      <label for="cat-folder">Folder</label>
      <div class="inline">
        <input id="cat-folder" type="text" placeholder="/path/to/photos">
        <button class="btn ghost" data-browse="cat-folder">Browse…</button>
      </div>
    </div>
    <div class="field">
      <label for="cat-output">Output CSV</label>
      <input id="cat-output" type="text" value="catalog.csv">
    </div>
    <button id="cat-build" class="btn">Build catalog</button>
    <p id="cat-status" class="status"></p>
  </section>
</main>

<!-- Lightbox -->
<div id="lightbox" class="modal" hidden>
  <div class="lightbox-box">
    <img id="lightbox-img" alt="">
    <div class="lightbox-info">
      <p id="lightbox-caption"></p>
      <p id="lightbox-keywords" class="lightbox-kw"></p>
      <div class="lightbox-actions">
        <button id="lightbox-edit" class="btn ghost">Edit metadata</button>
        <button id="lightbox-close" class="btn">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Folder picker -->
<div id="picker" class="modal" hidden>
  <div class="modal-box">
    <div class="modal-head">
      <span id="picker-path" class="picker-path"></span>
      <button id="picker-close" class="btn ghost" aria-label="Close">✕</button>
    </div>
    <ul id="picker-list" class="picker-list"></ul>
    <div class="modal-foot">
      <button id="picker-up" class="btn ghost">↑ Up</button>
      <button id="picker-pick" class="btn">Select this folder</button>
    </div>
  </div>
</div>

<footer>Non-destructive · no lock-in · MIT licensed</footer>

<script>
  document.querySelectorAll(".tab").forEach((t) => {
    t.addEventListener("click", () => {
      const id = t.dataset.tab;
      document.querySelectorAll(".tab").forEach((x) => x.classList.toggle("is-active", x === t));
      document.querySelectorAll(".panel").forEach((p) =>
        p.classList.toggle("is-active", p.dataset.panel === id));
    });
  });
</script>
<script src="/app.js"></script>
</body>
</html>
